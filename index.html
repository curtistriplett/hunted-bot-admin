<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUNTED BOT - Roblox Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
    .gradient-text { background: linear-gradient(135deg, #ef4444, #dc2626); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #0a0a0a; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-primary { background: linear-gradient(135deg, #dc2626, #b91c1c); }
    .btn-primary:hover { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .input { background: #000; border: 1px solid rgba(239, 68, 68, 0.3); color: #fff; }
    .input:focus { border-color: #ef4444; outline: none; }
    .badge-owner { background: rgba(168, 85, 247, 0.2); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
    .badge-admin { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-mod { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge-player { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [page, setPage] = useState('login');
      const [user, setUser] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [logs, setLogs] = useState([]);
      const [stats, setStats] = useState({});
      const [loading, setLoading] = useState(false);
      const [toast, setToast] = useState(null);
      const [admins, setAdmins] = useState([]);
      const [settings, setSettings] = useState({});

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const login = async (username, password) => {
        if (username === 'Hovia' && password === 'Curtis2008#') {
          setUser({ username: 'Hovia', role: 'Owner' });
          setPage('dashboard');
          loadDashboard();
          showToast('Welcome back, Hovia!');
        } else {
          showToast('Invalid credentials', 'error');
        }
      };

      const loadDashboard = async () => {
        try {
          const [statsRes, logsRes, adminsRes, settingsRes] = await Promise.all([
            fetch('/api/stats').then(r => r.json()),
            fetch('/api/logs?limit=5').then(r => r.json()),
            fetch('/api/admins').then(r => r.json()),
            fetch('/api/settings').then(r => r.json())
          ]);
          setStats(statsRes);
          setLogs(logsRes.logs || []);
          setAdmins(adminsRes.admins || []);
          setSettings(settingsRes.settings || {});
        } catch (e) {
          console.error('Load dashboard error:', e);
        }
      };

      const searchUsers = async (query) => {
        if (!query) return;
        setLoading(true);
        try {
          const res = await fetch('/api/users/search?q=' + encodeURIComponent(query));
          const data = await res.json();
          setSearchResults(data.users || []);
        } catch (e) {
          showToast('Search failed', 'error');
        }
        setLoading(false);
      };

      const banUser = async (userId, reason) => {
        await fetch('/api/users/' + userId + '/ban', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason, executor: user?.username || 'System' })
        });
        showToast('User banned successfully');
        searchUsers(searchQuery);
        loadDashboard();
      };

      const kickUser = async (userId, reason) => {
        await fetch('/api/users/' + userId + '/kick', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason, executor: user?.username || 'System' })
        });
        showToast('User kicked successfully');
        loadDashboard();
      };

      const updateSettings = async (updates) => {
        await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates)
        });
        setSettings({ ...settings, ...updates });
        showToast('Settings saved');
      };

      if (page === 'login') {
        return <LoginPage onLogin={login} />;
      }

      return (
        <Dashboard
          user={user}
          page={page}
          setPage={setPage}
          searchQuery={searchQuery}
          setSearchQuery={setSearchQuery}
          searchResults={searchResults}
          searchUsers={searchUsers}
          logs={logs}
          stats={stats}
          loading={loading}
          banUser={banUser}
          kickUser={kickUser}
          admins={admins}
          settings={settings}
          updateSettings={updateSettings}
          toast={toast}
        />
      );
    }

    function LoginPage({ onLogin }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        onLogin(username, password);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-black p-4">
          <div className="fixed inset-0 overflow-hidden">
            <div className="absolute -top-1/2 -left-1/2 w-full h-full bg-red-900/10 rounded-full blur-3xl"></div>
            <div className="absolute -bottom-1/2 -right-1/2 w-full h-full bg-red-800/5 rounded-full blur-3xl"></div>
          </div>
          <div className="relative w-full max-w-md">
            <div className="card rounded-2xl shadow-2xl shadow-red-900/10 p-8">
              <div className="flex flex-col items-center mb-8">
                <div className="w-16 h-16 rounded-xl btn-primary flex items-center justify-center mb-4">
                  <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                  </svg>
                </div>
                <h1 className="text-2xl font-bold gradient-text">HUNTED BOT</h1>
                <p className="text-gray-500 text-sm mt-1">Admin Dashboard</p>
              </div>
              <form onSubmit={handleSubmit} className="space-y-5">
                <div>
                  <label className="block text-gray-300 mb-2">Username</label>
                  <input
                    type="text"
                    value={username}
                    onChange={(e) => setUsername(e.target.value)}
                    className="input w-full px-4 py-3 rounded-lg"
                    placeholder="Enter username"
                  />
                </div>
                <div>
                  <label className="block text-gray-300 mb-2">Password</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="input w-full px-4 py-3 rounded-lg"
                    placeholder="Enter password"
                  />
                </div>
                <button type="submit" className="w-full btn-primary py-3 rounded-lg font-medium text-white transition-all hover:scale-[1.02]">
                  Login
                </button>
              </form>
              <div className="mt-6 pt-6 border-t border-red-900/20 text-center">
                <p className="text-xs">
                  <span className="text-gray-600">Powered by </span>
                  <span className="text-red-500 font-medium">Hovia Creations</span>
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Dashboard({ user, page, setPage, searchQuery, setSearchQuery, searchResults, searchUsers, logs, stats, loading, banUser, kickUser, admins, settings, updateSettings, toast }) {
      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
        { id: 'search', label: 'User Search', icon: '🔍' },
        { id: 'logs', label: 'Logs', icon: '📋' },
        { id: 'owner', label: 'Owner Panel', icon: '👑' }
      ];

      return (
        <div className="min-h-screen bg-black flex">
          <aside className="w-64 bg-[#0a0a0a] border-r border-red-900/20 fixed h-full">
            <div className="p-6">
              <div className="flex items-center gap-3 mb-8">
                <div className="w-10 h-10 rounded-lg btn-primary flex items-center justify-center">
                  <span className="text-white font-bold">HB</span>
                </div>
                <div>
                  <h2 className="font-bold text-white">HUNTED BOT</h2>
                  <p className="text-xs text-gray-500">Admin Panel</p>
                </div>
              </div>
              <nav className="space-y-1">
                {navItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => setPage(item.id)}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${
                      page === item.id ? 'bg-red-600/20 text-red-400 border border-red-600/30' : 'text-gray-400 hover:bg-red-900/10 hover:text-gray-300'
                    }`}
                  >
                    <span>{item.icon}</span>
                    <span>{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>
            <div className="absolute bottom-0 left-0 right-0 p-4 border-t border-red-900/20">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-purple-600/20 flex items-center justify-center">
                  <span className="text-purple-400 font-bold">{user.username[0]}</span>
                </div>
                <div>
                  <p className="font-medium text-white text-sm">{user.username}</p>
                  <span className="badge-owner text-xs px-2 py-0.5 rounded">{user.role}</span>
                </div>
              </div>
            </div>
          </aside>
          <main className="flex-1 ml-64 p-8">
            {toast && (
              <div className={`fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white`}>
                {toast.message}
              </div>
            )}
            {page === 'dashboard' && <DashboardPage stats={stats} logs={logs} />}
            {page === 'search' && <SearchPage searchQuery={searchQuery} setSearchQuery={setSearchQuery} searchResults={searchResults} searchUsers={searchUsers} loading={loading} banUser={banUser} kickUser={kickUser} />}
            {page === 'logs' && <LogsPage logs={logs} />}
            {page === 'owner' && <OwnerPage settings={settings} updateSettings={updateSettings} admins={admins} />}
          </main>
        </div>
      );
    }

    function DashboardPage({ stats, logs }) {
      const statCards = [
        { label: 'Online Players', value: stats.onlinePlayers || 0, color: 'text-green-400' },
        { label: 'Active Bans', value: stats.activeBans || 0, color: 'text-red-400' },
        { label: 'Temp Bans', value: stats.tempBans || 0, color: 'text-orange-400' },
        { label: 'New Logs', value: stats.newLogs || 0, color: 'text-blue-400' }
      ];

      return (
        <div className="space-y-6">
          <div>
            <h1 className="text-2xl font-bold text-white">Dashboard</h1>
            <p className="text-gray-500">Overview of your admin panel</p>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            {statCards.map((stat, i) => (
              <div key={i} className="card p-6 rounded-xl">
                <p className="text-gray-500 text-sm">{stat.label}</p>
                <p className={`text-3xl font-bold ${stat.color}`}>{stat.value.toLocaleString()}</p>
              </div>
            ))}
          </div>
          <div className="card rounded-xl overflow-hidden">
            <div className="p-4 border-b border-red-900/20">
              <h3 className="font-semibold text-white">Recent Activity</h3>
            </div>
            <div className="divide-y divide-red-900/10">
              {(logs || []).slice(0, 5).map(log => (
                <div key={log.id} className="p-4 flex items-center justify-between">
                  <div>
                    <p className="text-white font-medium">{log.action}</p>
                    <p className="text-gray-500 text-sm">{log.user}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-gray-400 text-sm">{log.executor}</p>
                    <p className="text-gray-600 text-xs">{log.timestamp}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function SearchPage({ searchQuery, setSearchQuery, searchResults, searchUsers, loading, banUser, kickUser }) {
      const [banModal, setBanModal] = useState(null);
      const [kickModal, setKickModal] = useState(null);
      const [reason, setReason] = useState('');

      useEffect(() => {
        const timeout = setTimeout(() => {
          if (searchQuery) searchUsers(searchQuery);
        }, 300);
        return () => clearTimeout(timeout);
      }, [searchQuery]);

      return (
        <div className="space-y-6">
          <div>
            <h1 className="text-2xl font-bold text-white">User Search</h1>
            <p className="text-gray-500">Search for Roblox players</p>
          </div>
          <div className="relative">
            <input
              type="text"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              placeholder="Search username..."
              className="input w-full px-4 py-4 rounded-xl text-lg"
            />
            {loading && (
              <div className="absolute right-4 top-1/2 -translate-y-1/2">
                <div className="w-5 h-5 border-2 border-red-500 border-t-transparent rounded-full animate-spin"></div>
              </div>
            )}
          </div>
          <div className="space-y-4">
            {searchResults.map(user => (
              <div key={user.id} className="card p-5 rounded-xl">
                <div className="flex items-start gap-4">
                  <img src={user.avatar} alt={user.username} className="w-16 h-16 rounded-full border-2 border-red-900/30" />
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1">
                      <h3 className="font-semibold text-lg text-white">{user.username}</h3>
                      <span className="badge-player text-xs px-2 py-0.5 rounded">{user.role}</span>
                    </div>
                    <p className="text-gray-500 text-sm">ID: {user.id}</p>
                    <div className="flex items-center gap-4 mt-2">
                      <span className="text-sm">
                        <span className="text-gray-500">Status: </span>
                        <span className={user.status === 'Online' ? 'text-green-400' : 'text-gray-400'}>{user.status}</span>
                      </span>
                      <span className="text-sm text-gray-400">Last seen: {user.lastSeen}</span>
                    </div>
                    <a href={user.robloxProfile} target="_blank" className="text-red-400 text-sm hover:underline mt-2 inline-block">View Roblox Profile</a>
                  </div>
                  <div className="flex flex-col gap-2">
                    <button onClick={() => setBanModal(user)} className="px-4 py-2 bg-red-600/20 text-red-400 rounded-lg text-sm hover:bg-red-600/30 border border-red-600/30">Ban</button>
                    <button onClick={() => setKickModal(user)} className="px-4 py-2 bg-yellow-600/20 text-yellow-400 rounded-lg text-sm hover:bg-yellow-600/30 border border-yellow-600/30">Kick</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          {banModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
              <div className="card p-6 rounded-xl max-w-md w-full mx-4">
                <h3 className="text-xl font-bold text-white mb-4">Ban {banModal.username}</h3>
                <textarea value={reason} onChange={(e) => setReason(e.target.value)} placeholder="Reason for ban..." className="input w-full px-4 py-3 rounded-lg mb-4 h-24"></textarea>
                <div className="flex gap-3">
                  <button onClick={() => { banUser(banModal.id, reason); setBanModal(null); setReason(''); }} className="flex-1 btn-primary py-2 rounded-lg text-white">Ban User</button>
                  <button onClick={() => { setBanModal(null); setReason(''); }} className="px-4 py-2 border border-red-900/30 rounded-lg text-gray-400">Cancel</button>
                </div>
              </div>
            </div>
          )}
          {kickModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
              <div className="card p-6 rounded-xl max-w-md w-full mx-4">
                <h3 className="text-xl font-bold text-white mb-4">Kick {kickModal.username}</h3>
                <textarea value={reason} onChange={(e) => setReason(e.target.value)} placeholder="Reason for kick..." className="input w-full px-4 py-3 rounded-lg mb-4 h-24"></textarea>
                <div className="flex gap-3">
                  <button onClick={() => { kickUser(kickModal.id, reason); setKickModal(null); setReason(''); }} className="flex-1 bg-yellow-600 hover:bg-yellow-500 py-2 rounded-lg text-white">Kick User</button>
                  <button onClick={() => { setKickModal(null); setReason(''); }} className="px-4 py-2 border border-red-900/30 rounded-lg text-gray-400">Cancel</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function LogsPage({ logs }) {
      return (
        <div className="space-y-6">
          <div>
            <h1 className="text-2xl font-bold text-white">Moderation Logs</h1>
            <p className="text-gray-500">Track all admin actions</p>
          </div>
          <div className="card rounded-xl overflow-hidden">
            <table className="w-full">
              <thead className="bg-black/50">
                <tr>
                  {['Action', 'User', 'Executor', 'Reason', 'Time'].map(h => (
                    <th key={h} className="text-left p-4 text-gray-400 font-medium text-sm">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-red-900/10">
                {(logs || []).map(log => (
                  <tr key={log.id} className="hover:bg-red-900/5">
                    <td className="p-4"><span className="text-white">{log.action}</span></td>
                    <td className="p-4 text-gray-300">{log.user}</td>
                    <td className="p-4 text-gray-400">{log.executor}</td>
                    <td className="p-4 text-gray-400">{log.reason || '-'}</td>
                    <td className="p-4 text-gray-500 text-sm">{log.timestamp}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function OwnerPage({ settings, updateSettings, admins }) {
      const [activeTab, setActiveTab] = useState('settings');
      const [localSettings, setLocalSettings] = useState(settings);

      useEffect(() => {
        setLocalSettings(settings);
      }, [settings]);

      return (
        <div className="space-y-6">
          <div>
            <h1 className="text-2xl font-bold text-white">Owner Panel</h1>
            <p className="text-gray-500">Full system control</p>
          </div>
          <div className="flex gap-4 border-b border-red-900/20">
            {['settings', 'admins'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} className={`pb-3 px-2 capitalize ${activeTab === tab ? 'text-red-400 border-b-2 border-red-400' : 'text-gray-500'}`}>{tab}</button>
            ))}
          </div>
          {activeTab === 'settings' && (
            <div className="card p-6 rounded-xl space-y-6">
              <div>
                <label className="block text-gray-400 mb-2">Site Name</label>
                <input value={localSettings.siteName || ''} onChange={(e) => setLocalSettings({ ...localSettings, siteName: e.target.value })} className="input w-full px-4 py-3 rounded-lg" />
              </div>
              <div>
                <label className="block text-gray-400 mb-2">Site Description</label>
                <input value={localSettings.siteDescription || ''} onChange={(e) => setLocalSettings({ ...localSettings, siteDescription: e.target.value })} className="input w-full px-4 py-3 rounded-lg" />
              </div>
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-white">User Access</p>
                  <p className="text-gray-500 text-sm">Allow users to access panel</p>
                </div>
                <button onClick={() => setLocalSettings({ ...localSettings, userAccessEnabled: !localSettings.userAccessEnabled })} className={`w-12 h-6 rounded-full transition-colors ${localSettings.userAccessEnabled ? 'bg-red-600' : 'bg-gray-600'}`}>
                  <div className={`w-5 h-5 rounded-full bg-white transition-transform ${localSettings.userAccessEnabled ? 'translate-x-6' : 'translate-x-1'}`}></div>
                </button>
              </div>
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-white">Maintenance Mode</p>
                  <p className="text-gray-500 text-sm">Disable all user access</p>
                </div>
                <button onClick={() => setLocalSettings({ ...localSettings, maintenanceMode: !localSettings.maintenanceMode })} className={`w-12 h-6 rounded-full transition-colors ${localSettings.maintenanceMode ? 'bg-yellow-600' : 'bg-gray-600'}`}>
                  <div className={`w-5 h-5 rounded-full bg-white transition-transform ${localSettings.maintenanceMode ? 'translate-x-6' : 'translate-x-1'}`}></div>
                </button>
              </div>
              <button onClick={() => updateSettings(localSettings)} className="btn-primary px-6 py-3 rounded-lg text-white font-medium">Save Settings</button>
            </div>
          )}
          {activeTab === 'admins' && (
            <div className="card rounded-xl overflow-hidden">
              <div className="p-4 border-b border-red-900/20">
                <h3 className="font-semibold text-white">Manage Admins</h3>
              </div>
              <div className="divide-y divide-red-900/10">
                {(admins || []).map(admin => (
                  <div key={admin.id} className="p-4 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full bg-red-600/20 flex items-center justify-center">
                        <span className="text-red-400 font-bold">{admin.username[0]}</span>
                      </div>
                      <div>
                        <p className="text-white font-medium">{admin.username}</p>
                        <span className={`text-xs px-2 py-0.5 rounded ${admin.role === 'Owner' ? 'badge-owner' : admin.role === 'Admin' ? 'badge-admin' : 'badge-mod'}`}>{admin.role}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
